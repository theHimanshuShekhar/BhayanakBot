  #   env_file:
  #     - .env
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@10.1.1.111:2222/bhayanakbot
  #     NODE_ENV: production
  #   networks:
  #     - botnet

  bot:
    build:
      context: .
      target: production
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # These override any values in .env so service hostnames are always correct
      VALKEY_URL: redis://valkey:6379
      OLLAMA_URL: http://ollama:11434
      SD_URL: http://stable-diffusion:7860
      NODE_ENV: production
    networks:
      - botnet

  stable-diffusion:
    image: ghcr.io/jim60105/stable-diffusion-webui:latest
    restart: unless-stopped
    command: >
      python launch.py
      --api --nowebui
      --use-cpu all
      --no-half
      --skip-torch-cuda-test
    ports:
      - "7860:7860"
    volumes:
      - sddata:/stable-diffusion-webui/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/sdapi/v1/sd-models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - botnet

  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: bhayanakbot
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d bhayanakbot"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   networks:
  #     - botnet

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --appendonly yes
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - botnet

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - botnet

networks:
  botnet:
    driver: bridge

volumes:
  pgdata:
  valkeydata:
  ollamadata:
  sddata:
